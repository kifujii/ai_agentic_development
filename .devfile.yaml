schemaVersion: 2.2.0
metadata:
  name: ai-agentic-development
  displayName: AI Agentic Development
  description: AI駆動Infrastructure as Code開発環境

components:
  - name: python
    container:
      image: python:3.11
      memoryLimit: 4Gi
      mountSources: true
      volumeMounts:
        - name: pip-cache
          path: /home/user/.cache/pip
      env:
        - name: PYTHONUNBUFFERED
          value: "1"
  
  - name: pip-cache
    volume:
      size: 2Gi

commands:
  - id: setup
    exec:
      component: python
      commandLine: sh -c "if [ -f scripts/setup_devspaces.sh ]; then chmod +x scripts/setup_devspaces.sh && (command -v bash >/dev/null 2>&1 && bash scripts/setup_devspaces.sh || sh scripts/setup_devspaces.sh) || echo 'Setup script completed with warnings'; else echo 'Setup script not found, skipping...'; fi"
      workingDir: ${PROJECT_SOURCE}

# postStartフックは削除（ワークスペース起動を確実にするため）
# セットアップスクリプトはワークスペース起動後に手動で実行してください:
# ./scripts/setup_devspaces.sh
