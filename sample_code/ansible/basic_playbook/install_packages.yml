---
# パッケージインストールのPlaybook

- name: パッケージのインストール
  hosts: webservers
  become: yes
  
  tasks:
    - name: 必要なパッケージをインストール
      yum:
        name:
          - htop
          - git
          - curl
          - wget
        state: present
        update_cache: yes
    
    - name: インストールされたパッケージの確認
      command: rpm -qa | grep -E "htop|git|curl|wget"
      register: installed_packages
      changed_when: false
    
    - name: インストール結果を表示
      debug:
        msg: "インストールされたパッケージ: {{ installed_packages.stdout_lines }}"
