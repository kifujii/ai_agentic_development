---
# サーバー再起動の自動化Playbook

- name: サーバー再起動の自動化
  hosts: webservers
  become: yes
  
  handlers:
    - name: restart services
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - sshd
        - crond
  
  tasks:
    - name: 再起動前の状態確認
      shell: uptime
      register: uptime_before
      changed_when: false
    
    - name: 再起動前の状態を表示
      debug:
        msg: "再起動前の稼働時間: {{ uptime_before.stdout }}"
    
    - name: サーバーを再起動
      reboot:
        reboot_timeout: 300
        pre_reboot_delay: 10
        post_reboot_delay: 30
    
    - name: 再起動後の状態確認
      shell: uptime
      register: uptime_after
      changed_when: false
    
    - name: 再起動後の状態を表示
      debug:
        msg: "再起動後の稼働時間: {{ uptime_after.stdout }}"
    
    - name: サービスの再起動
      notify: restart services
